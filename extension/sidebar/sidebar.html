<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure Clippy</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">☁️</span>
      <span class="logo-text">Azure Clippy</span>
    </div>
    <div class="subtitle">Step-by-step guidance for Azure Portal</div>
  </header>

  <div class="search-box">
    <input
      type="text"
      id="search"
      placeholder="Search a workflow... (e.g. 'vm', 'vnet', 'storage')"
      autocomplete="off"
    />
  </div>

  <div id="suggested" class="section" style="display:none">
    <div class="section-title">Suggested for this page</div>
    <div id="suggested-list"></div>
  </div>

  <div class="section">
    <div class="section-title">All workflows</div>
    <div id="category-list"></div>
  </div>

  <div id="status" class="status"></div>

  <script src="sidebar.js"></script>
</body>
</html>
