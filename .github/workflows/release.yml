name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package and publish extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create extension zip
        run: |
          cd extension
          zip -r ../azure-clippy-${{ github.ref_name }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: azure-clippy-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## Azure Clippy ${{ github.ref_name }}

            ### Installation
            1. Download `azure-clippy-${{ github.ref_name }}.zip` below
            2. Extract to a folder
            3. Open Edge: `edge://extensions` or Chrome: `chrome://extensions`
            4. Enable **Developer mode**
            5. Click **Load unpacked** and select the extracted folder

            See the [README](README.md) for more information.
