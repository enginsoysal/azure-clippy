name: Weekly Health Check

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:        # Can also be triggered manually

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Verify workflow selectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: health-check/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: health-check

      - name: Install Playwright
        run: npx playwright install --with-deps
        working-directory: health-check

      - name: Run health checks
        run: npx playwright test
        working-directory: health-check

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: health-check/report/
          retention-days: 30

      - name: Open issue on broken selectors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Health Check] Broken workflow(s) detected — ${date}`,
              labels: ['broken-workflow', 'needs-fix'],
              body: [
                '## Weekly Health Check Failed',
                '',
                `The health check on **${date}** detected one or more broken or invalid workflows.`,
                '',
                `**[View details in the workflow run](${runUrl})**`,
                '',
                '## What to check',
                '',
                '1. Open the Playwright report (artifact in the workflow run)',
                '2. Find the failing test — it will name the workflow and the exact problem',
                '3. Fix the workflow JSON file (update selector, add missing field, etc.)',
                '4. Update `lastVerified` to today\'s date',
                '5. Submit a pull request',
                '',
                '_This issue was automatically created by the Azure Clippy health check._',
              ].join('\n'),
            });
