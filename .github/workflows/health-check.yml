name: Weekly Health Check

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:        # Can also be triggered manually

jobs:
  health-check:
    name: Verify workflow selectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: health-check/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: health-check

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: health-check

      - name: Run health checks
        run: npx playwright test
        working-directory: health-check
        env:
          AZURE_USER: ${{ secrets.AZURE_TEST_USER }}
          AZURE_PASS: ${{ secrets.AZURE_TEST_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: health-check/report/
          retention-days: 30

      - name: Open issue on broken selectors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Health Check] Broken workflow selector(s) — ${date}`,
              labels: ['broken-workflow', 'needs-fix'],
              body: [
                '## Weekly Health Check Failed',
                '',
                `The health check on **${date}** detected one or more broken selectors.`,
                'This means the Azure Portal has been updated and some CSS/ARIA selectors have changed.',
                '',
                `**[View details in the workflow run](${runUrl})**`,
                '',
                '## Action required',
                '',
                '1. Open the Playwright report (artifact in the workflow run)',
                '2. Find the broken step in the corresponding workflow JSON file',
                '3. Update the `selector` or `fallbackSelector` to the new value',
                '4. Update `lastVerified` in the JSON file to today\'s date',
                '5. Submit a pull request',
                '',
                '_This issue was automatically created by the Azure Clippy health check._',
              ].join('\n'),
            });
