name: Weekly Health Check

on:
  schedule:
    - cron: '0 7 * * 1'   # Elke maandag om 07:00 UTC
  workflow_dispatch:        # Ook handmatig te triggeren

jobs:
  health-check:
    name: Verify workflow selectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: health-check/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: health-check

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: health-check

      - name: Run health checks
        id: health
        run: npx playwright test
        working-directory: health-check
        env:
          AZURE_USER: ${{ secrets.AZURE_TEST_USER }}
          AZURE_PASS: ${{ secrets.AZURE_TEST_PASS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: health-check/report/
          retention-days: 30

      - name: Open issue bij gefaalde selectors
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Health Check] Gebroken workflow-selector(s) — ${date}`,
              labels: ['broken-workflow', 'needs-fix'],
              body: [
                '## Wekelijkse Health Check gefaald',
                '',
                `De health check van **${date}** heeft één of meer gebroken selectors gedetecteerd.`,
                'Dit betekent dat Azure Portal is bijgewerkt en de CSS/ARIA-selectors veranderd zijn.',
                '',
                `**[Bekijk de details in de workflow run](${runUrl})**`,
                '',
                '## Actie vereist',
                '',
                '1. Bekijk het Playwright-rapport (artifact in de workflow run)',
                '2. Zoek de gebroken stap op in de bijbehorende workflow JSON',
                '3. Update de `selector` of `fallbackSelector` naar de nieuwe waarde',
                '4. Update `lastVerified` in het JSON-bestand naar vandaag',
                '5. Submit een PR',
                '',
                '_Dit issue is automatisch aangemaakt door de Azure Clippy health check._',
              ].join('\n'),
            });
